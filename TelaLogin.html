<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aluga Aí</title>
    <link rel="stylesheet" href="css/pagesstyle.css">
    <link rel="icon" href="imagens/iconAlugaai.png">
</head>
<body>
    
    <div class="login-container">
        <img src="imagens/logoAlugaai.png" alt="logo" class="logo-login">
        <form action="index.html">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>

            <div class="checkbox-container">
            <label for="manter_conectado">Manter conectado</label>
            <input type="checkbox" name="manter_conectado" id="manter_conectado">
            </div>

            <button class="botao-acessar">Acessar</button>
        </form>

    <a href="index.html"><button class="voltar-inicio">Voltar a tela inicial</button></a>
    </div>

</body>
</html>
