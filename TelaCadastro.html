<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cadastro - Aluga Aí</title>
</head>
<body>
    <!-- Cabeçalho da página de cadastro -->
    <header>
        <h1>Aluga Aí</h1>
    </header>

    <!-- Seção do formulário de cadastro -->
    <section>
        <h2>Criar conta</h2>

        <form action="TelaVerificação.html">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="seu@email.com" required>

            <label for="usuario">Usuário</label>
            <input type="text" id="usuario" name="usuario" placeholder="Nome de usuário" required>

            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>

            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>

            <label for="repetir_senha">Repetir senha</label>
            <input type="password" id="repetir_senha" name="repetir_senha" placeholder="Repita a senha" required>

            <button type="submit">Avançar</button>
        </form>
    </section>

    <!-- Botão de voltar -->
    <a href="index.html"><button>Voltar à tela inicial</button></a>

</body>
</html>
