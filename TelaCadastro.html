<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Aluga Aí</title>
    <link rel="stylesheet" href="css/pagesstyle.css">
    <link rel="icon" href="imagens/iconAlugaai.png">
</head>
<body>

    <div class="cadastro-container">
        <img src="imagens/logoAlugaai.png" alt="logo" class="logo-cadastro">
        <h2>Cadastre-se</h2>
        
        <form action="TelaVerificação.html">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required placeholder="Digite seu e-mail">

            <label for="usuário">Usuário</label>
            <input type="text" id="usuário" name="usuário" required placeholder="Nome do usuário">

            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" name="telefone" required placeholder="(00) 00000-0000">

            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" required placeholder="Digite sua senha">

            <label for="repetir_senha">Repetir senha</label>
            <input type="password" id="repetir_senha" name="repetir_senha" required placeholder="Digite sua semha novamente">

            <button type="submit" class="botao-avancar">Avançar</button>
        </form>

    <a href="index.html"><button class="voltar-telacadastro">Voltar a tela inicial</button></a>
    </div>


</body>
</html>
