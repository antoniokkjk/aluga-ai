<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Verificação - Aluga Aí</title>
</head>
<body>
    <!-- Cabeçalho da página de verificação -->
    <header>
        <h1>Aluga Aí</h1>
    </header>

    <!-- Seção do formulário de verificação -->
    <section>
        <h2>Verificação por SMS</h2>

        <form action="index.html">
            <label for="codigo">Insira o código enviado por SMS</label>
            <input type="text" id="codigo" maxlength="6" placeholder="000000" required>

            <button type="submit">Confirmar código</button>
        </form>
    </section>

    <!-- Botão de voltar -->
    <a href="TelaCadastro.html"><button>Voltar ao cadastro</button></a>

</body>
</html>
